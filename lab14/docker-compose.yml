networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

services:
  #nginx
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-server
    ports:
      - "4001:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend
      - backend
    depends_on:
      - php-fpm

  #php
  php-fpm:
    image: php:8.2-fpm-alpine
    container_name: php-fpm
    volumes:
      - ./src:/var/www/html
    networks:
      - backend

  #MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: secret_root_password
      MYSQL_DATABASE: test_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend

  #phpMyadmin
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: phpmyadmin-panel
    ports:
      - "6001:80"
    environment:
      PMA_HOST: mysql-db
      PMA_USER: root
      PMA_PASSWORD: secret_root_password
    networks:
      - frontend
      - backend
    depends_on:
      - mysql

volumes:
  mysql_data: