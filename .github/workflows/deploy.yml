name: Build, Test and Push Container

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY_GH: ghcr.io
  IMAGE_NAME_GH: ghcr.io/baltexo/zadanie2-app
  CACHE_REPO_DH: baltexo/zadanie2-cache

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GH }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build local image for testing
        uses: docker/build-push-action@v6
        with:
          context: ./zadanie2
          load: true 
          tags: local-test-image:latest

        #trivy
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-test-image:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Build and push Multi-Arch Image with Cache
        uses: docker/build-push-action@v6
        with:
          context: ./zadanie2
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME_GH }}:latest
            ${{ env.IMAGE_NAME_GH }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.CACHE_REPO_DH }}:cache
          cache-to: type=registry,ref=${{ env.CACHE_REPO_DH }}:cache,mode=max
